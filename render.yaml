services:
  - type: web
    name: flint-api
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uvicorn flint.api.app:create_app --factory --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LLM_PROVIDER
        value: claude
      - key: FLINT_ENV
        value: production
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: localhost:9092
