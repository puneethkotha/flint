<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/flint-logo.png" type="image/png" sizes="32x32" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>Flint</title>
    <style>
      /* Force dark always. Flint is a dark-only tool */
      :root { color-scheme: dark only; }
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root {
        background: #080808 !important;
        color: #f5f5f5;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      /* Kill any OS light-mode overrides on native elements */
      @media (prefers-color-scheme: light) {
        html, body, #root { background: #080808 !important; color: #f5f5f5 !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
